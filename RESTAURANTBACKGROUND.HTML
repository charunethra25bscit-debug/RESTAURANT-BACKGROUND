<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gourmet Kitchen | Order Online</title>
    <style>
        /* Simplified styles for brevity - full CSS in reference */
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://unsplash.com') center/cover fixed; color: white; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        header { grid-column: 1 / -1; text-align: center; color: #ffbe33; }
        .menu-item { background: rgba(0,0,0,0.5); padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .cart-section { background: rgba(0,0,0,0.8); padding: 20px; position: sticky; top: 20px; height: fit-content; }
        button { background: #ffbe33; border: none; padding: 10px; cursor: pointer; width: 100%; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header><h1>The Gourmet Kitchen</h1></header>
    <div class="container">
        <main>
            <div class="menu-item">
                <h3>Truffle Risotto</h3><p>$18.99</p>
                <button onclick="addToCart('Truffle Risotto', 18.99)">Add to Cart</button>
            </div>
            <!-- Additional items can be added here -->
        </main>
        <aside class="cart-section">
            <h2>Your Order</h2>
            <div id="cart-items">Empty</div>
            <h3>Total: $<span id="cart-total">0.00</span></h3>
        </aside>
    </div>
    <script>
        // JavaScript logic for cart functionality, see full code in
        let cart = [];
        function addToCart(name, price) { /* Simplified logic */ alert(name + " added!"); }
    </script>
</body>
</html>
